<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Ocean Background (Ink) -->
  <circle cx="100" cy="100" r="95" fill="#3D405B" />
  
  <!-- Ocean Waves (Ocean) -->
  <path d="M10,120 C50,90 80,140 110,120 C140,100 170,150 210,120 V200 H10 Z" fill="#81B29A" opacity="0.8" />
  <path d="M10,140 C60,110 90,160 120,140 C150,120 180,170 210,140 V200 H10 Z" fill="#81B29A" opacity="0.5" />

  <!-- Road/Beach (Sun) -->
  <path d="M10,165 Q110,135 210,165 V200 H10 Z" fill="#F2CC8F" />

  <!-- Goan Rooster (Earth Red) -->
  <g transform="translate(68, 48) scale(0.65)">
    <!-- Body -->
    <path d="M40,80 C10,80 10,40 40,40 C70,40 70,80 40,80" fill="#BC4749" />
    <!-- Wing detail -->
    <path d="M40,55 Q30,55 30,65 Q30,75 40,75" fill="none" stroke="white" stroke-width="2" opacity="0.5" />
    <!-- Tail Feathers -->
    <path d="M20,60 C0,40 15,10 35,30" fill="none" stroke="#F2CC8F" stroke-width="6" stroke-linecap="round" />
    <path d="M15,55 C-5,30 10,5 30,25" fill="none" stroke="#81B29A" stroke-width="4" stroke-linecap="round" />
    <!-- Neck & Head -->
    <path d="M50,45 L58,25 Q58,10 72,15 L78,35 Z" fill="#BC4749" />
    <circle cx="70" cy="22" r="2.5" fill="white" />
    <!-- Comb -->
    <path d="M58,20 Q58,5 68,10 Q78,5 78,20" fill="#BC4749" stroke="#3D405B" stroke-width="1" />
    <!-- Beak -->
    <path d="M75,26 L88,30 L75,34 Z" fill="#F2CC8F" />
  </g>

  <!-- Yellow SUV (Sun) -->
  <g transform="translate(100, 158) scale(0.35)">
    <path d="M10,45 L10,30 Q10,15 30,15 L90,15 Q110,15 110,30 L110,45 Z" fill="#F2CC8F" />
    <rect x="15" y="45" width="95" height="25" rx="5" fill="#F2CC8F" />
    <!-- Windows -->
    <rect x="30" y="20" width="25" height="15" rx="2" fill="#3D405B" />
    <rect x="65" y="20" width="25" height="15" rx="2" fill="#3D405B" />
    <!-- Wheels -->
    <circle cx="35" cy="70" r="10" fill="#333" />
    <circle cx="85" cy="70" r="10" fill="#333" />
  </g>

  <!-- Text -->
  <text x="100" y="194" text-anchor="middle" font-family="Georgia, serif" font-weight="900" font-size="18" fill="#386641">GO GOA</text>
</svg>
