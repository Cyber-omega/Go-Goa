<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded Square Container -->
  <rect x="5" y="5" width="190" height="190" rx="45" fill="#3D405B" />
  
  <!-- Outer Gold Ring -->
  <circle cx="100" cy="100" r="85" fill="#F2CC8F" opacity="0.2" />
  <circle cx="100" cy="100" r="80" stroke="#F2CC8F" stroke-width="4" fill="none" />
  
  <!-- Inner Decorative Circle Background -->
  <circle cx="100" cy="100" r="75" fill="#3D405B" />
  <circle cx="100" cy="100" r="70" stroke="#F2CC8F" stroke-width="1" fill="none" opacity="0.5" />

  <!-- Sun -->
  <circle cx="125" cy="95" r="15" fill="#F2CC8F" />

  <!-- Ocean Waves -->
  <path d="M30,130 Q65,100 100,130 T170,130 V175 H30 Z" fill="#81B29A" />
  <path d="M30,140 Q65,110 100,140 T170,140" fill="none" stroke="#F5F2E9" stroke-width="3" stroke-linecap="round" opacity="0.8" />

  <!-- Goan Rooster -->
  <g transform="translate(65, 45) scale(0.8)">
    <path d="M20,60 C0,60 0,30 25,20 C50,10 80,30 80,60 C80,90 50,100 20,60" fill="#BC4749" />
    <path d="M10,40 Q-10,30 0,10 Q10,-10 30,15" fill="#386641" />
    <path d="M5,45 Q-15,45 -10,25 Q-5,5 15,20" fill="#F2CC8F" />
    <!-- Head & Comb -->
    <path d="M70,30 L80,10 Q85,5 90,15 L85,35 Z" fill="#BC4749" />
    <path d="M80,10 Q80,0 85,5 Q90,0 90,10" fill="#E07A5F" stroke="#3D405B" stroke-width="1" />
    <circle cx="82" cy="22" r="2" fill="white" />
    <path d="M88,25 L98,28 L88,32 Z" fill="#F2CC8F" />
  </g>

  <!-- Coastal Road/Path -->
  <path d="M40,165 Q100,150 160,165" fill="none" stroke="#F2CC8F" stroke-width="10" stroke-linecap="round" />

  <!-- The Yellow SUV -->
  <g transform="translate(85, 152) scale(0.4)">
    <rect x="5" y="10" width="70" height="25" rx="4" fill="#F2CC8F" />
    <path d="M15,10 L25,0 L55,0 L65,10 Z" fill="#F2CC8F" />
    <circle cx="20" cy="35" r="8" fill="#111" />
    <circle cx="60" cy="35" r="8" fill="#111" />
  </g>

  <!-- Labels -->
  <text x="100" y="188" text-anchor="middle" font-family="Georgia, serif" font-weight="900" font-size="20" fill="#F5F2E9">GO GOA</text>
</svg>
